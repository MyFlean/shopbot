name: Deploy Lambda Function

# Triggers on push when Lambda paths change
on:
  push:
    branches:
      - main
      - master
    paths:
      - 'shopping_bot/**'
      - 'lambda_handler.py'
      - 'requirements.txt'
      - 'deployment/lambda/**'
      - '.github/workflows/deploy-lambda.yml'
  workflow_dispatch: {}  # Allow manual triggering via gh workflow run

env:
  AWS_REGION: ap-south-1
  TERRAFORM_VERSION: 1.5.0
  PYTHON_VERSION: 3.12

jobs:
  deploy:
    name: Build and Deploy Lambda
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Build Lambda package with Docker
        run: |
          echo "=== Building Lambda Deployment Package ==="
          chmod +x deployment/lambda/build-docker.sh
          ./deployment/lambda/build-docker.sh
          
          # Verify package was created
          if [ ! -f shopbot.zip ]; then
            echo "❌ Error: shopbot.zip was not created"
            exit 1
          fi
          
          # Display package info
          ls -lh shopbot.zip
          echo "✅ Package built successfully"

      - name: Prepare Terraform variables for CI
        working-directory: deployment/lambda
        env:
          SHOPBOT_SECRETS_ARN: ${{ secrets.SHOPBOT_SECRETS_ARN }}
        run: |
          # terraform.tfvars is untracked (contains secrets) - create from example for CI
          if [ ! -f terraform.tfvars ]; then
            echo "Creating terraform.tfvars from example for CI..."
            cp terraform.tfvars.example terraform.tfvars
            # Replace placeholder ARN with value from GitHub secret
            if [ -n "$SHOPBOT_SECRETS_ARN" ]; then
              sed -i "s|secrets_manager_secret_arn = \".*\"|secrets_manager_secret_arn = \"$SHOPBOT_SECRETS_ARN\"|" terraform.tfvars
            else
              echo "::warning::SHOPBOT_SECRETS_ARN not set - add it to GitHub secrets for CI deployment"
              echo "Using placeholder from terraform.tfvars.example (plan may fail)"
            fi
          fi
          echo "Terraform variables prepared"

      - name: Initialize Terraform
        working-directory: deployment/lambda
        run: |
          terraform init -input=false

      - name: Import existing resources (if needed)
        working-directory: deployment/lambda
        continue-on-error: true
        env:
          TF_VAR_enable_custom_domain: "false"
          TF_VAR_enable_api_gateway_access_logs: "false"
          TF_VAR_secrets_manager_secret_arn: ${{ secrets.SHOPBOT_SECRETS_ARN }}
          TF_VAR_es_url: ${{ secrets.ES_URL }}
          TF_VAR_es_api_key: ${{ secrets.ES_API_KEY }}
        run: |
          echo "Attempting to import existing resources..."
          for resource in "aws_iam_role.lambda_role:shopbot-service-lambda-role" \
                         "aws_cloudwatch_log_group.lambda_logs:/aws/lambda/shopbot-service" \
                         "aws_cloudwatch_log_group.apigw_logs:/aws/apigateway/shopbot-service" \
                         "aws_lambda_function.shopbot:shopbot-service"; do
            tf_resource="${resource%%:*}"
            import_id="${resource#*:}"
            echo "Importing $tf_resource..."
            terraform import "$tf_resource" "$import_id" || true
          done
          API_ID=$(aws apigatewayv2 get-apis --region ${{ env.AWS_REGION }} --query "Items[?Name=='shopbot-service-api'].ApiId" --output text 2>/dev/null | head -1)
          if [ -n "$API_ID" ]; then
            echo "Importing API Gateway $API_ID..."
            terraform import aws_apigatewayv2_api.shopbot "$API_ID" || true
            terraform import 'aws_apigatewayv2_stage.shopbot' "${API_ID}/\$default" || true
          fi

      - name: Validate Terraform configuration
        working-directory: deployment/lambda
        run: |
          terraform validate

      - name: Terraform Plan
        working-directory: deployment/lambda
        run: |
          terraform plan -out=tfplan -input=false
        env:
          TF_VAR_enable_custom_domain: "false"
          # CI user (shopbot-cicd-user) lacks logs:CreateLogDelivery; matches Import step
          TF_VAR_enable_api_gateway_access_logs: "false"
          TF_VAR_secrets_manager_secret_arn: ${{ secrets.SHOPBOT_SECRETS_ARN }}
          TF_VAR_secrets_manager_secret_name: "flean-services/shopbot"
          TF_VAR_es_url: ${{ secrets.ES_URL }}
          TF_VAR_es_api_key: ${{ secrets.ES_API_KEY }}

      - name: Terraform Apply
        working-directory: deployment/lambda
        run: |
          terraform apply -auto-approve tfplan
        env:
          TF_LOG: INFO
          TF_VAR_enable_custom_domain: "false"
          TF_VAR_enable_api_gateway_access_logs: "false"
          TF_VAR_secrets_manager_secret_arn: ${{ secrets.SHOPBOT_SECRETS_ARN }}
          TF_VAR_secrets_manager_secret_name: "flean-services/shopbot"
          TF_VAR_es_url: ${{ secrets.ES_URL }}
          TF_VAR_es_api_key: ${{ secrets.ES_API_KEY }}

      - name: Verify Lambda deployment
        run: |
          echo "=== Verifying Lambda Function ==="
          FUNCTION_NAME=$(cd deployment/lambda && terraform output -raw lambda_function_name)
          
          if [ -z "$FUNCTION_NAME" ]; then
            echo "❌ Error: Could not get Lambda function name"
            exit 1
          fi
          
          echo "Lambda Function: $FUNCTION_NAME"
          
          # Get function configuration
          aws lambda get-function \
            --function-name "$FUNCTION_NAME" \
            --region ${{ env.AWS_REGION }} \
            --query 'Configuration.[FunctionName,LastModified,Runtime,MemorySize,Timeout]' \
            --output table
          
          echo "✅ Lambda function verified"

      - name: Test Lambda endpoint
        run: |
          echo "=== Testing Lambda Endpoint ==="
          API_URL=$(cd deployment/lambda && terraform output -raw api_gateway_url 2>/dev/null || echo "")
          
          if [ -n "$API_URL" ]; then
            echo "API Gateway URL: $API_URL"
            echo "Testing health endpoint..."
            
            # Wait a few seconds for API Gateway to propagate
            sleep 10
            
            # Test health endpoint
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/rs/health" || echo "000")
            
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Health endpoint returned 200 OK"
              curl -s "${API_URL}/rs/health" | jq . || echo "Response received"
            else
              echo "⚠️  Health endpoint returned: $RESPONSE"
              echo "This might be normal if the endpoint requires authentication"
            fi
          else
            echo "⚠️  API Gateway URL not available (might be using custom domain)"
          fi

      - name: Upload Lambda package artifact
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: lambda-package
          path: shopbot.zip
          retention-days: 7

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Lambda Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          FUNCTION_NAME=$(cd deployment/lambda && terraform output -raw lambda_function_name 2>/dev/null || echo "N/A")
          API_URL=$(cd deployment/lambda && terraform output -raw api_gateway_url 2>/dev/null || echo "N/A")
          
          echo "**Lambda Function:** \`$FUNCTION_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "**API Gateway URL:** $API_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

















