name: Deploy Lambda Function

# AWS CI principal: IAM user shopbot-github-deploy.
#   Credentials: repository secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY.
# Lambda code deploy uses AWS CLI (no Terraform). Set ES_URL secret to OpenSearch Serverless HTTPS endpoint.
on:
  push:
    branches:
      - main
      - master
    paths:
      - 'shopping_bot/**'
      - 'lambda_handler.py'
      - 'requirements.txt'
      - 'deployment/lambda/**'
      - '.github/workflows/deploy-lambda.yml'
  workflow_dispatch: {}

env:
  AWS_REGION: ap-south-1
  LAMBDA_FUNCTION_NAME: shopbot-service
  PYTHON_VERSION: 3.12

jobs:
  deploy:
    name: Build and Deploy Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Lambda package with Docker
        run: |
          echo "=== Building Lambda Deployment Package ==="
          chmod +x deployment/lambda/build-docker.sh
          ./deployment/lambda/build-docker.sh

          if [ ! -f shopbot.zip ]; then
            echo "Error: shopbot.zip was not created"
            exit 1
          fi

          ls -lh shopbot.zip
          echo "Package built successfully"

      - name: Deploy Lambda function code (AWS CLI)
        run: |
          chmod +x deployment/lambda/deploy-lambda-aws-cli.sh
          ./deployment/lambda/deploy-lambda-aws-cli.sh
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          LAMBDA_FUNCTION_NAME: ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Update Lambda environment for AOSS (optional)
        env:
          ES_URL: ${{ secrets.ES_URL }}
          AWS_REGION: ${{ env.AWS_REGION }}
          LAMBDA_FUNCTION_NAME: ${{ env.LAMBDA_FUNCTION_NAME }}
          SEARCH_AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          if [ -z "${ES_URL:-}" ]; then
            echo "Skipping env merge: ES_URL secret not set (Lambda keeps existing environment)."
            exit 0
          fi
          chmod +x deployment/lambda/update-lambda-env-aoss.sh
          ./deployment/lambda/update-lambda-env-aoss.sh

      - name: Verify Lambda deployment
        run: |
          echo "=== Verifying Lambda Function ==="
          aws lambda get-function \
            --function-name "${{ env.LAMBDA_FUNCTION_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Configuration.[FunctionName,LastModified,Runtime,MemorySize,Timeout]' \
            --output table
          echo "Lambda function verified"

      - name: Test Lambda endpoint
        run: |
          echo "=== Testing Lambda Endpoint ==="
          API_URL=$(aws apigatewayv2 get-apis --region "${{ env.AWS_REGION }}" --output json | \
            jq -r '[.Items[] | select(.Name=="shopbot-service-api")] | sort_by(.CreatedDate) | .[0].ApiEndpoint // empty')

          if [ -n "$API_URL" ] && [ "$API_URL" != "null" ]; then
            echo "API Gateway URL: $API_URL"
            sleep 5
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/rs/health" || echo "000")
            if [ "$RESPONSE" = "200" ]; then
              echo "Health endpoint returned 200 OK"
              curl -s "${API_URL}/rs/health" | jq . || true
            else
              echo "Health endpoint returned: $RESPONSE"
            fi
          else
            echo "API Gateway shopbot-service-api not found; skip HTTP test"
          fi

      - name: Upload Lambda package artifact
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: lambda-package
          path: shopbot.zip
          retention-days: 7

      - name: Deployment summary
        if: always()
        run: |
          API_URL=$(aws apigatewayv2 get-apis --region "${{ env.AWS_REGION }}" --output json 2>/dev/null | \
            jq -r '[.Items[] | select(.Name=="shopbot-service-api")] | sort_by(.CreatedDate) | .[0].ApiEndpoint // "N/A"')
          echo "## Lambda Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Lambda:** \`${{ env.LAMBDA_FUNCTION_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**API (HTTP API):** $API_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy method: **AWS CLI** (\`update-function-code\`). Terraform not used in CI." >> $GITHUB_STEP_SUMMARY
